experiment:
  name: halfcheetah_td3
  algorithm: td3_only
  seed: 0
  total_steps: 200000
  output_dir: outputs

env:
  name: HalfCheetah-v4
  eval_episodes: 5

network:
  hidden_dim: 256
  hidden_layers: 2

td3:
  batch_size: 128
  buffer_size: 500000
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.0003
  critic_lr: 0.0003
  exploration_noise: 0.1
  policy_noise: 0.2
  noise_clip: 0.5
  policy_delay: 2
  warmup_steps: 5000
  update_ratio: 1.0

logging:
  eval_interval: 5000
  checkpoint_interval: 10000
  console_interval: 1000

scheduler:
  update_interval: 5000
  enabled: false
  strategy: uncertainty
  explore_fraction: 0.25
  initial_mode: Hybrid
  ema_alpha: 0.8
  disagreement_weight: 0.5
  progress_weight: 0.5
  progress_scale: 10.0
  explore_enter: 0.65
  explore_exit: 0.55
  exploit_enter: 0.35
  exploit_exit: 0.45
  min_mode_steps: 5000
  modes:
    Explore:
      active_ea_heads: 4
      update_ratio: 0.5
      pop_fraction: 0.7
    Hybrid:
      active_ea_heads: 2
      update_ratio: 1.0
      pop_fraction: 0.5
    Exploit:
      active_ea_heads: 1
      update_ratio: 1.0
      pop_fraction: 0.2

ba_ugd_erl:
  enabled: false
  num_ea_heads: 4
  pop_buffer_size: 500000
  mixed_sampling:
    enabled: false
    pop_fraction: 0.5
  ea:
    rollout_enabled: false
    rollout_interval: 5000
    rollout_episodes_per_head: 1
    active_heads: 4
    exploration_noise: 0.1
    max_rollout_steps: 1000
  filter:
    enabled: false
    warmup_episodes: 5
    return_margin: 100.0
  evolution:
    enabled: false
    interval: 5000
    mutation_std: 0.05
  exploit_update_ratio: 1.0
